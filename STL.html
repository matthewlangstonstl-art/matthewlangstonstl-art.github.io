<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Master Scout Report</title>
    <style>
        :root {
            --grass-green: #2d5a27;
            --dirt-brown: #c5a076;
            --base-white: #ffffff;
            --text-dark: #222;
            --card-bg: #f9f9f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0e5e0;
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }
        .header {
            background-color: var(--grass-green);
            color: var(--base-white);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            border-bottom: 6px solid var(--dirt-brown);
        }
        .header h1 { margin: 0; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px;}
        
        .controls {
            background: var(--base-white);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            align-items: center;
        }
        input[type="date"], input[type="text"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 6px;
            outline: none;
        }
        input[type="text"]:focus, input[type="date"]:focus { border-color: var(--grass-green); }
        button {
            background-color: #c41e3a;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #a01830; }
        button:disabled { background-color: #999; cursor: not-allowed; }

        #loading {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--grass-green);
            display: none;
            margin: 20px 0;
        }

        .section-title {
            background-color: #111;
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 8px 8px 0 0;
            margin-top: 30px;
            margin-bottom: 0;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--base-white);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th { background-color: #333; color: white; }
        .away-col { background-color: #f4f6f8; }
        .home-col { background-color: #fff; }
        .out-of-pos { color: #c41e3a; font-weight: bold; }

        .diagram-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .diagram-card {
            background: grey;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            width: 600px;
            border: 4px solid var(--dirt-brown);
        }
        .diagram-header {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
            color: white;
        }
        .diagram-team { font-size: 24px; font-weight: 900; text-transform: uppercase; }

        /* SVG Styles injected via logic */
        .grass { fill: var(--grass-green); } 
        .dirt { fill: var(--dirt-brown); }
        .line { stroke: #ffffff; stroke-width: 3; }
        .base { fill: #ffffff; }
        .p-circle { fill: #cc0000; stroke: #ffffff; stroke-width: 2; }
        .p-num { fill: #ffffff; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
        .p-label { fill: #ffffff; font-size: 12px; font-weight: 800; text-anchor: middle; }
        .p-name { fill: #ffffff; font-size: 12px; font-weight: bold; text-anchor: middle; }
        .p-back { fill: #ffffff; font-size: 12px; font-weight: bold; text-anchor: middle; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚾ MLB Master Scout</h1>
        <p>Unified Complete Report & Visual Lineups</p>
    </div>

    <div class="controls">
        <input type="date" id="dateInput" title="Select Game Date">
        <input type="text" id="teamInput" placeholder="Team Name (e.g., Cardinals)">
        <button id="runBtn" onclick="runMasterScout()">Run Scout Report</button>
    </div>

    <div id="loading">⚾ Scouting in progress... Fetching MLB Data...</div>
    <div id="reportContainer"></div>

<script>
    // --- 1. CORE FETCH & UTILITY LOGIC ---
    async function fetchJSON(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error("API Fetch Error");
        return await response.json();
    }

    function abbreviateSub(desc) {
        if (!desc) return "";
        return desc
            .replace(/Defensive Substitution:/gi, "")
            .replace(/Offensive Substitution:/gi, "")
            .replace(/Defensive switch from/gi, "")
            .replace(/Pinch-hitter/gi, "PH")
            .replace(/Pinch-runner/gi, "PR")
            .replace(/Substitution/gi, "SUB")
            .replace(/remains in the game as the/gi, "remains")
            .replace(/center field/gi, "CF")
            .replace(/left field/gi, "LF")
            .replace(/right field/gi, "RF")
            .replace(/first base/gi, "1B")
            .replace(/second base/gi, "2B")
            .replace(/third base/gi, "3B")
            .replace(/shortstop/gi, "SS")
            .replace(/catcher/gi, "C")
            .replace(/designated hitter/gi, "DH")
            .replace(/batting (\d)\w+, playing/gi, "at")
            .trim();
    }

    async function getTeamId(input) {
        const data = await fetchJSON("https://statsapi.mlb.com/api/v1/teams?sportId=1");
        const search = input.toLowerCase().trim();
        for (let t of data.teams) {
            if (t.abbreviation.toLowerCase() === search || t.teamName.toLowerCase() === search || t.name.toLowerCase().includes(search)) {
                return t.id;
            }
        }
        return null;
    }

    async function getPlayerVersatility(playerId, activePos) {
        try {
            const data = await fetchJSON(`https://statsapi.mlb.com/api/v1/people/${playerId}?hydrate=stats(group=[fielding],type=[career])`);
            const stats = data.people[0]?.stats;
            if (!stats || stats.length === 0) return "";
            let positions = [];
            for (let split of stats[0].splits) {
                let pos = split.position.abbreviation;
                if (!["P","DH","PH","PR","TWP","O", activePos].includes(pos) && !positions.includes(pos)) {
                    positions.push(pos);
                }
            }
            return positions.sort().join(", ");
        } catch(e) { return ""; }
    }

    async function formatPlayerData(p, isStarter) {
        let gamePos = p.position.abbreviation;
        if (isStarter && p.allPositions && p.allPositions.length > 0) {
            gamePos = p.allPositions[0].abbreviation;
        }
        const primPos = (p.person && p.person.primaryPosition) ? p.person.primaryPosition.abbreviation : gamePos;
        let isOutOfPos = false;
        
        if (isStarter && gamePos !== primPos && primPos !== "TWP" && gamePos !== "DH") {
            isOutOfPos = true;
        }
        
        return { 
            num: p.jerseyNumber || "-", 
            name: p.person.fullName, 
            pos: gamePos, 
            prim: primPos,
            backups: await getPlayerVersatility(p.person.id, gamePos),
            isOutOfPos: isOutOfPos
        };
    }

    async function getPlayerInSlot(players, slot) {
        for (let id in players) {
            if (players[id].battingOrder == slot) {
                return await formatPlayerData(players[id], true);
            }
        }
        return {num:"", name:"TBD", pos:"", backups:"", isOutOfPos: false, prim: ""};
    }

    async function getBench(players) {
        let benchPromises = [];
        for (let id in players) {
            let p = players[id];
            let order = parseInt(p.battingOrder);
            if (p.position.abbreviation !== "P") {
                if (!order || order % 100 !== 0) {
                    benchPromises.push(formatPlayerData(p, false));
                }
            }
        }
        return await Promise.all(benchPromises);
    }

    // --- 2. HISTORICAL DATA LOGIC ---
    async function getPastGameList(endDateStr, teamName) {
        try {
            let endDate = new Date(endDateStr);
            let startDate = new Date(endDate);
            startDate.setDate(startDate.getDate() - 45); 
            let startStr = startDate.toISOString().split('T')[0];
            
            const schedule = await fetchJSON(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&startDate=${startStr}&endDate=${endDateStr}`);
            let games = [];
            if (schedule.dates) {
                schedule.dates.forEach(d => {
                    d.games.forEach(g => {
                        if ((g.teams.away.team.name.toLowerCase().includes(teamName.toLowerCase()) || 
                             g.teams.home.team.name.toLowerCase().includes(teamName.toLowerCase())) && 
                             g.status.abstractGameState === "Final") {
                            games.push({pk: g.gamePk, date: d.date, summary: g.teams.away.team.name + " @ " + g.teams.home.team.name});
                        }
                    });
                });
            }
            return games.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 4);
        } catch(e) { return []; }
    }

    async function getHistoryData(endDateStr, teamName) {
        let history = [];
        let games = await getPastGameList(endDateStr, teamName);
        
        for (let game of games) {
            let live = await fetchJSON(`https://statsapi.mlb.com/api/v1/game/${game.pk}/playByPlay`);
            let box = await fetchJSON(`https://statsapi.mlb.com/api/v1/game/${game.pk}/boxscore`);
            
            let side = (game.summary.toLowerCase().indexOf(teamName.toLowerCase()) === 0) ? "away" : "home";
            let players = box.teams[side].players;
            let gameSubs = [];
            let allSubLines = [];

            if (live.allPlays) {
                live.allPlays.forEach(play => {
                    let inning = (play.about.halfInning === "bottom" ? "B" : "T") + play.about.inning;
                    if (play.playEvents) {
                        play.playEvents.forEach(ev => {
                            if (ev.details && ev.details.description) {
                                allSubLines.push({ inning: inning, desc: ev.details.description });
                            }
                        });
                    }
                });
            }

            for (let id in players) {
                let p = players[id];
                if (p.position.abbreviation === "P") continue;
                
                let order = parseInt(p.battingOrder);
                let isStarter = (order && order % 100 === 0);
                let allPos = (p.allPositions || []).map(pos => pos.abbreviation);
                let lastName = p.person.fullName.split(" ").pop();
                let entryDetail = "";

                for (let l = 0; l < allSubLines.length; l++) {
                    let line = allSubLines[l].desc;
                    if (line.includes(lastName) && (line.includes("Substitution") || line.includes("pinch") || line.includes("to "))) {
                        entryDetail = allSubLines[l].inning + ": " + abbreviateSub(line.split(".")[0]);
                        break; 
                    }
                }

                if (!isStarter) {
                    if ((p.stats.batting && p.stats.batting.plateAppearances > 0) || (p.stats.fielding && parseFloat(p.stats.fielding.inningsPlayed) > 0)) {
                        gameSubs.push([p.jerseyNumber || "-", p.person.fullName, allPos.join("->"), entryDetail || "ENT"]);
                    }
                } else if (allPos.length > 1) {
                    gameSubs.push([p.jerseyNumber || "-", p.person.fullName, allPos.join("->"), entryDetail || "SHIFT"]);
                }
            }
            history.push({date: game.date, summary: game.summary, subs: gameSubs});
        }
        return history;
    }

    async function getReliefHistory(endDateStr, teamName) {
        let history = [];
        let pastGames = await getPastGameList(endDateStr, teamName);
        for (let game of pastGames) {
            let box = await fetchJSON(`https://statsapi.mlb.com/api/v1/game/${game.pk}/boxscore`);
            let side = (game.summary.toLowerCase().indexOf(teamName.toLowerCase()) === 0) ? "away" : "home";
            let teamBox = box.teams[side];
            let relievers = [];
            if (teamBox.pitchers) {
                for (let i = 1; i < teamBox.pitchers.length; i++) {
                    let p = teamBox.players["ID" + teamBox.pitchers[i]];
                    let s = p.stats.pitching;
                    relievers.push([p.jerseyNumber || "-", p.person.fullName, s.inningsPitched + " (" + s.earnedRuns + ")", s.numberOfPitches || 0]);
                }
            }
            history.push({ summary: game.summary + " (" + game.date + ")", relievers: relievers });
        }
        return history;
    }

    // --- 3. DIAGRAM GENERATOR ---
    function generateDiagramSVG(lineup) {
        const cx = 300, hpY = 520;
        const posMap = {
            'P':  {x: cx, y: hpY - 175, lbl: 'P'},
            'C':  {x: cx, y: hpY + 25,  lbl: 'C'},
            '1B': {x: cx + 130, y: hpY - 265, lbl: '1B'},
            '2B': {x: cx + 80, y: hpY - 360, lbl: '2B'},
            '3B': {x: cx - 130, y: hpY - 265, lbl: '3B'},
            'SS': {x: cx - 80, y: hpY - 360, lbl: 'SS'},
            'LF': {x: cx - 180, y: hpY - 390, lbl: 'LF'},
            'CF': {x: cx, y: hpY - 500, lbl: 'CF'},
            'RF': {x: cx + 180, y: hpY - 390, lbl: 'RF'},
            'DH': {x: 520, y: 550, lbl: 'DH'}
        };

        return `<svg width="100%" height="100%" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
            <path d="M 300 520 L 20 240 A 300 400 0 0 1 580 240 Z" class="grass" />
            <path d="M 300 520 L 80 300 A 230 280 0 0 1 520 300 Z" class="dirt" />
            <path d="M 300 480 L 465 315 L 300 150 L 135 315 Z" class="grass" />
            
            <circle cx="300" cy="520" r="45" class="dirt" />
            <circle cx="300" cy="345" r="35" class="dirt" /> 
            <rect x="285" y="343" width="30" height="4" fill="#ffffff" /> 

            <line x1="300" y1="520" x2="20" y2="240" class="line" />
            <line x1="300" y1="520" x2="580" y2="240" class="line" />

            <rect x="292" y="512" width="16" height="16" class="base" transform="rotate(45 300 520)"/>
            <rect x="457" y="307" width="16" height="16" class="base" transform="rotate(45 465 315)"/>
            <rect x="292" y="142" width="16" height="16" class="base" transform="rotate(45 300 150)"/>
            <rect x="127" y="307" width="16" height="16" class="base" transform="rotate(45 135 315)"/>

            ${lineup.map(player => {
                const p = posMap[player.pos];
                if (!p) return '';
                return `
                <g>
                    <circle cx="${p.x}" cy="${p.y}" r="18" class="p-circle" />
                    <text x="${p.x}" y="${p.y}" class="p-num">${player.num}</text>
                    <text x="${p.x}" y="${p.y - 25}" class="p-label">${p.lbl}</text>
                    <text x="${p.x}" y="${p.y + 32}" class="p-name">${player.name.split(' ').pop()}</text>
                    <text x="${p.x}" y="${p.y + 43}" class="p-back">${player.backups}</text>
                </g>`;
            }).join('')}
        </svg>`;
    }

    // --- 4. MAIN EXECUTOR ---
    async function runMasterScout() {
        const searchDate = document.getElementById('dateInput').value;
        const teamInput = document.getElementById('teamInput').value;
        if (!searchDate || !teamInput) {
            alert("Please enter both a date and a team name.");
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('runBtn').disabled = true;
        document.getElementById('reportContainer').innerHTML = '';

        try {
            const targetTeamId = await getTeamId(teamInput);
            if (!targetTeamId) throw new Error("Could not find team.");

            const scheduleData = await fetchJSON(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${targetTeamId}&date=${searchDate}`);
            if (!scheduleData.dates || scheduleData.dates.length === 0) throw new Error("No game found for that date.");

            const game = scheduleData.dates[0].games[0];
            const boxData = await fetchJSON(`https://statsapi.mlb.com/api/v1/game/${game.gamePk}/boxscore`);

            const awayName = game.teams.away.team.name;
            const homeName = game.teams.home.team.name;

            // --- PROCESS LINEUPS ---
            let awayLineup = [], homeLineup = [];
            const orderSlots = [100, 200, 300, 400, 500, 600, 700, 800, 900];
            for (let slot of orderSlots) {
                awayLineup.push(await getPlayerInSlot(boxData.teams.away.players, slot));
                homeLineup.push(await getPlayerInSlot(boxData.teams.home.players, slot));
            }

            const awayBench = await getBench(boxData.teams.away.players);
            const homeBench = await getBench(boxData.teams.home.players);

            // --- RENDER ROSTERS & DIAGRAMS ---
            let html = `
                <div class="diagram-container">
                    <div class="diagram-card">
                        <div class="diagram-header"><div class="diagram-team">${awayName}</div><div>${searchDate}</div></div>
                        ${generateDiagramSVG(awayLineup)}
                    </div>
                    <div class="diagram-card">
                        <div class="diagram-header"><div class="diagram-team">${homeName}</div><div>${searchDate}</div></div>
                        ${generateDiagramSVG(homeLineup)}
                    </div>
                </div>
                
                <h2 class="section-title">Matchup Lineups & Bench</h2>
                <table>
                    <tr>
                        <th colspan="5" style="background:#c41e3a;">AWAY: ${awayName.toUpperCase()}</th>
                        <th colspan="4" style="background:#005A9C;">HOME: ${homeName.toUpperCase()}</th>
                    </tr>
                    <tr>
                        <th>ORD</th><th>#</th><th>STARTER</th><th>POS</th><th>BACKUPS</th>
                        <th>#</th><th>STARTER</th><th>POS</th><th>BACKUPS</th>
                    </tr>`;

            for(let i=0; i<9; i++) {
                let a = awayLineup[i], h = homeLineup[i];
                html += `<tr>
                    <td><b>${i+1}</b></td>
                    <td class="away-col">${a.num}</td><td class="away-col ${a.isOutOfPos?'out-of-pos':''}">${a.name}</td><td class="away-col"><b>${a.pos}</b></td><td class="away-col"><i>${a.backups}</i></td>
                    <td class="home-col">${h.num}</td><td class="home-col ${h.isOutOfPos?'out-of-pos':''}">${h.name}</td><td class="home-col"><b>${h.pos}</b></td><td class="home-col"><i>${h.backups}</i></td>
                </tr>`;
            }

            html += `<tr><th colspan="9" style="background:#444;">BENCH PLAYERS</th></tr>`;
            let benchCount = Math.max(awayBench.length, homeBench.length);
            for(let b=0; b<benchCount; b++) {
                let aB = awayBench[b] || {num:"", name:"", pos:"", backups:""};
                let hB = homeBench[b] || {num:"", name:"", pos:"", backups:""};
                html += `<tr>
                    <td>-</td>
                    <td class="away-col">${aB.num}</td><td class="away-col">${aB.name}</td><td class="away-col">${aB.pos}</td><td class="away-col"><i>${aB.backups}</i></td>
                    <td class="home-col">${hB.num}</td><td class="home-col">${hB.name}</td><td class="home-col">${hB.pos}</td><td class="home-col"><i>${hB.backups}</i></td>
                </tr>`;
            }
            html += `</table>`;

            // --- FETCH & RENDER HISTORIES (Parallel for speed) ---
            document.getElementById('loading').innerHTML = "⚾ Generating Historical Sub & Relief Data...";
            
            const [awayHistory, homeHistory, awayRelief, homeRelief] = await Promise.all([
                getHistoryData(searchDate, awayName),
                getHistoryData(searchDate, homeName),
                getReliefHistory(searchDate, awayName),
                getReliefHistory(searchDate, homeName)
            ]);

            html += `<h2 class="section-title" style="background:#000;">4-Game Positional Sub History</h2>
                     <table style="table-layout: fixed;">
                        <tr><th colspan="4" style="background:#222;">${awayName.toUpperCase()}</th><th colspan="4" style="background:#222;">${homeName.toUpperCase()}</th></tr>`;
            
            for (let i=0; i<4; i++) {
                let aG = awayHistory[i], hG = homeHistory[i];
                html += `<tr>
                    <td colspan="4" style="background:#eee; text-align:center;"><b>${aG ? aG.summary + " (" + aG.date + ")" : "No Data"}</b></td>
                    <td colspan="4" style="background:#eee; text-align:center;"><b>${hG ? hG.summary + " (" + hG.date + ")" : "No Data"}</b></td>
                </tr>
                <tr style="font-style:italic;">
                    <th>#</th><th>Player</th><th>Path</th><th>Detail</th>
                    <th>#</th><th>Player</th><th>Path</th><th>Detail</th>
                </tr>`;
                
                let maxSubs = Math.max(aG ? aG.subs.length : 0, hG ? hG.subs.length : 0);
                for (let s=0; s<maxSubs; s++) {
                    let aS = (aG && aG.subs[s]) ? aG.subs[s] : ["", "", "", ""];
                    let hS = (hG && hG.subs[s]) ? hG.subs[s] : ["", "", "", ""];
                    html += `<tr>
                        <td class="away-col">${aS[0]}</td><td class="away-col">${aS[1]}</td><td class="away-col">${aS[2]}</td><td class="away-col">${aS[3]}</td>
                        <td class="home-col">${hS[0]}</td><td class="home-col">${hS[1]}</td><td class="home-col">${hS[2]}</td><td class="home-col">${hS[3]}</td>
                    </tr>`;
                }
            }
            html += `</table>`;

            html += `<h2 class="section-title" style="background:#005A9C;">3-Game Relief Pitcher History</h2>
                     <table style="table-layout: fixed;">
                        <tr><th colspan="4" style="background:#111;">${awayName.toUpperCase()} RELIEVERS</th><th colspan="4" style="background:#111;">${homeName.toUpperCase()} RELIEVERS</th></tr>`;

            for (let i=0; i<3; i++) {
                let aRG = awayRelief[i], hRG = homeRelief[i];
                html += `<tr>
                    <td colspan="4" style="background:#eee; text-align:center;"><b>${aRG ? aRG.summary : "No Data"}</b></td>
                    <td colspan="4" style="background:#eee; text-align:center;"><b>${hRG ? hRG.summary : "No Data"}</b></td>
                </tr>
                <tr style="font-style:italic;">
                    <th>#</th><th>Reliever</th><th>IP (ER)</th><th>Pitches</th>
                    <th>#</th><th>Reliever</th><th>IP (ER)</th><th>Pitches</th>
                </tr>`;
                
                let maxRP = Math.max(aRG ? aRG.relievers.length : 0, hRG ? hRG.relievers.length : 0);
                for (let r=0; r<maxRP; r++) {
                    let aP = (aRG && aRG.relievers[r]) ? aRG.relievers[r] : ["", "", "", ""];
                    let hP = (hRG && hRG.relievers[r]) ? hRG.relievers[r] : ["", "", "", ""];
                    html += `<tr>
                        <td class="away-col">${aP[0]}</td><td class="away-col">${aP[1]}</td><td class="away-col">${aP[2]}</td><td class="away-col">${aP[3]}</td>
                        <td class="home-col">${hP[0]}</td><td class="home-col">${hP[1]}</td><td class="home-col">${hP[2]}</td><td class="home-col">${hP[3]}</td>
                    </tr>`;
                }
            }
            html += `</table>`;

            document.getElementById('reportContainer').innerHTML = html;

        } catch (error) {
            alert("Error: " + error.message);
            console.error(error);
        } finally {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('runBtn').disabled = false;
            document.getElementById('loading').innerHTML = "⚾ Scouting in progress... Fetching MLB Data...";
        }
    }
    // --- INITIALIZE ON LOAD ---
    window.onload = () => {
        // Set default date to today
        const d = new Date();
        document.getElementById('dateInput').valueAsDate = d;
        
        // Pre-fill team to Cardinals
        document.getElementById('teamInput').value = 'Cardinals';

        // Auto-run the scout report
        runMasterScout();
    };
    
</script>
</body>
