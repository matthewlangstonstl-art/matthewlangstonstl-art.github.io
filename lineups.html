<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MLB Lineup Matrix - Platoon Analytics</title>
    <style>
        :root { --primary: #0C2340; --secondary: #eeeeee; --accent: #005a9c; --bench: #f1f1f1; --highlight: #fff9c4; }
        body { font-family: -apple-system, sans-serif; margin: 20px; background: #fff; }
        
        .header-ui { background: var(--secondary); padding: 15px; border-radius: 4px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; border-bottom: 3px solid var(--primary); }
        select, input, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; }

        .table-container { overflow-x: auto; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { border: 1px solid #e0e0e0; padding: 10px; text-align: center; font-size: 13px; }
        
        .player-name { position: sticky; left: 0; background: white; z-index: 2; text-align: left; font-weight: 600; border-right: 2px solid var(--primary); min-width: 180px; }
        .bat-hand { font-size: 10px; color: #666; margin-left: 5px; font-weight: normal; }
        .hand-L, .hand-S { color: #d32f2f; font-weight: bold; }

        th { background: var(--primary); color: white; vertical-align: bottom; }
        .opp-pitcher { font-size: 11px; display: block; color: #ffeb3b; margin-top: 4px; font-weight: bold; }
        .section-divider { background: #e9ecef; font-weight: bold; text-align: left; padding: 8px 15px; text-transform: uppercase; font-size: 11px; color: #444; }

        /* Platoon Summary Styles */
        .platoon-container { display: flex; gap: 20px; margin-top: 30px; }
        .platoon-box { flex: 1; border: 1px solid var(--primary); border-radius: 4px; overflow: hidden; }
        .platoon-box h3 { background: var(--primary); color: white; margin: 0; padding: 10px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

    <div class="header-ui">
        <select id="teamSelect"><option>Loading...</option></select>
        <input type="date" id="startDate" value="2026-04-10">
        <input type="date" id="endDate" value="2026-04-24">
        <button onclick="generateReport()">Generate Lineup Report</button>
        <span id="status"></span>
    </div>

    <div class="table-container">
        <table id="mainTable">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="platoon-container" id="platoonSummary" style="display:none;">
        <div class="platoon-box">
            <h3>Most Common vs RHP</h3>
            <table id="vRTable"><thead><tr><th>#</th><th>Player</th><th>Pos</th></tr></thead><tbody></tbody></table>
        </div>
        <div class="platoon-box">
            <h3>Most Common vs LHP</h3>
            <table id="vLTable"><thead><tr><th>#</th><th>Player</th><th>Pos</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

<script>
const BASE_URL = "https://statsapi.mlb.com/api/v1";

async function init() {
    const resp = await fetch(`${BASE_URL}/teams?sportId=1`);
    const data = await resp.json();
    document.getElementById('teamSelect').innerHTML = data.teams
        .sort((a, b) => a.name.localeCompare(b.name))
        .map(t => `<option value="${t.id}">${t.name}</option>`).join('');
}

async function generateReport() {
    const teamId = document.getElementById('teamSelect').value;
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    document.getElementById('status').innerText = "Calculating Platoon Splits...";

    const schedResp = await fetch(`${BASE_URL}/schedule?teamId=${teamId}&startDate=${start}&endDate=${end}&sportId=1`);
    const schedData = await schedResp.json();
    
    const dates = schedData.dates.map(d => d.date).reverse();
    const latestDate = dates[0];
    const playerMatrix = {};
    const pitcherHands = {};
    
    // Track frequencies: { 'L': { 1: { 'Player Name': count } } }
    const freq = { 'L': {}, 'R': {} };
    for (let i=1; i<=9; i++) { freq.L[i] = {}; freq.R[i] = {}; }

    for (const day of schedData.dates) {
        const dateStr = day.date;
        for (const game of day.games) {
            const boxResp = await fetch(`${BASE_URL}/game/${game.gamePk}/boxscore`);
            const boxData = await boxResp.json();
            
            const isHome = boxData.teams.home.team.id == teamId;
            const mySide = isHome ? 'home' : 'away';
            const oppSide = isHome ? 'away' : 'home';
            
            const oppPitcherId = boxData.teams[oppSide].pitchers[0];
            let pHand = null;
            if (oppPitcherId) {
                const pResp = await fetch(`${BASE_URL}/people/${oppPitcherId}`);
                const pData = await pResp.json();
                pHand = pData.people[0].pitchHand.code;
                pitcherHands[dateStr] = pHand;
            }

            const players = boxData.teams[mySide].players;
            boxData.teams[mySide].battingOrder.forEach((id, idx) => {
                const orderSpot = idx + 1;
                const p = players["ID" + id];
                const name = p.person.fullName;
                const pos = p.position.abbreviation;

                if (!playerMatrix[name]) {
                    playerMatrix[name] = { data: {}, orderInLatest: 99, batSide: '?' };
                }

                playerMatrix[name].data[dateStr] = `${pos}-${orderSpot}`;
                if (dateStr === latestDate) playerMatrix[name].orderInLatest = orderSpot;

                // Log frequency if we have pitcher handedness
                if (pHand && orderSpot <= 9) {
                    const key = `${name}|${pos}`;
                    freq[pHand][orderSpot][key] = (freq[pHand][orderSpot][key] || 0) + 1;
                }
            });
        }
    }

    renderTable(dates, playerMatrix, pitcherHands);
    renderPlatoon(freq);
    document.getElementById('status').innerText = "";
    document.getElementById('platoonSummary').style.display = 'flex';
}


function renderTable(dates, matrix, hands) {
    let headHtml = `<tr><th class="player-name">Player</th>`;
    dates.forEach(d => {
        const hand = hands[d] ? `v${hands[d]}` : '--';
        headHtml += `<th><span class="date-cell">${d.substring(5).replace('-', '/')}</span><span class="opp-pitcher">${hand}</span></th>`;
    });
    document.getElementById('tableHeader').innerHTML = headHtml + `</tr>`;

    const playerList = Object.keys(matrix).map(name => ({ name, ...matrix[name] }));
    const starters = playerList.filter(p => p.orderInLatest <= 9).sort((a, b) => a.orderInLatest - b.orderInLatest);
    const bench = playerList.filter(p => p.orderInLatest === 99).sort((a, b) => a.name.localeCompare(b.name));

    let bodyHtml = `<tr class="section-divider"><td colspan="${dates.length + 1}">Most Recent Game Lineup</td></tr>`;
    starters.forEach(p => bodyHtml += createRow(p, dates));
    bodyHtml += `<tr class="section-divider"><td colspan="${dates.length + 1}">Bench / Depth</td></tr>`;
    bench.forEach(p => bodyHtml += createRow(p, dates, true));
    document.getElementById('tableBody').innerHTML = bodyHtml;
}

function createRow(p, dates, isBench = false) {
    let row = `<tr class="${isBench ? 'bench-row' : ''}"><td class="player-name">${p.name}</td>`;
    dates.forEach(date => { row += `<td>${p.data[date] || '--'}</td>`; });
    return row + `</tr>`;
}

init();
</script>
</body>
</html>
