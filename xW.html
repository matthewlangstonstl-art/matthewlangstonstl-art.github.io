<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Projections & Outliers</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #002D72; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9rem; }
        
        .summary-box { display: flex; justify-content: center; background: #002D72; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.95rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #002D72; color: white; padding: 15px 10px; font-size: 0.85rem; text-transform: uppercase; position: sticky; top: 0; }
        td { padding: 14px 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.95rem; }
        tr:nth-child(even) { background-color: #fcfdfe; }
        tr:hover { background-color: #f1f5f9; }

        .proj-cell { font-weight: bold; color: #002D72; background-color: #f0f4f8; }
        .diff-pos { color: #28a745; font-weight: 600; }
        .diff-neg { color: #dc3545; font-weight: 600; }
        
        .status-tag { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .lucky { background: #d4edda; color: #155724; }
        .unlucky { background: #f8d7da; color: #721c24; }
        .neutral { color: #999; font-weight: normal; }

        .loading { text-align: center; padding: 100px; font-style: italic; color: #888; }
    </style>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="navbar">
<a href="index.html">Home</a>
<a href="scouting.html">Scouting</a>
<a href="lineups.html">Lineups</a>
<a href="Subs.html">Subs</a>
<a href="xW.html">xW Tracker</a>
</div>
<div class="container">

<div class="container">
    <h1>MLB Expected Record Tracker</h1>
    <p class="subtitle">Pythagorean Expectation (xW) vs. Actual Performance | 162-Game Projections</p>
    
    <div id="summary" class="summary-box">
        <span id="sd-value">Initializing Statistical Engine...</span>
    </div>

    <div id="loader" class="loading">Accessing MLB Live Data...</div>

    <table id="mlbTable" style="display:none;">
        <thead>
            <tr>
                <th style="text-align:left">Team</th>
                <th>Actual W-L</th>
                <th>RS / RA</th>
                <th>Expected W-L</th>
                <th>Diff</th>
                <th>Projected 162</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const API_URL = "https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=2026&standingsTypes=regularSeason";

    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            let teams = [];

            data.records.forEach(div => {
                div.teamRecords.forEach(team => {
                    teams.push({
                        name: team.team.name,
                        w: team.wins,
                        l: team.losses,
                        rs: team.runsScored,
                        ra: team.runsAllowed
                    });
                });
            });
            processStats(teams);
        } catch (e) {
            document.getElementById('loader').innerText = "Unable to connect to MLB API.";
        }
    }

    function processStats(teams) {
        const exponent = 1.83;
        let diffs = [];
        
        const processedTeams = teams.map(team => {
            const currentGames = team.w + team.l;
            const rsExp = Math.pow(team.rs || 0, exponent);
            const raExp = Math.pow(team.ra || 0, exponent);
            const winPct = rsExp / (rsExp + raExp) || 0;

            const xW = Math.round(winPct * currentGames);
            const xL = currentGames - xW;
            const diff = team.w - xW;
            
            const projW = Math.round(winPct * 162);
            const projL = 162 - projW;

            diffs.push(diff);
            return { ...team, xW, xL, diff, projW, projL };
        });

        const n = diffs.length;
        const mean = diffs.reduce((a, b) => a + b, 0) / n;
        const stdDev = Math.sqrt(diffs.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b, 0) / n);
        const threshold = stdDev * 2;

        document.getElementById('sd-value').innerText = `League Std Dev: ±${stdDev.toFixed(2)} Wins | 2σ Outlier Threshold: ±${threshold.toFixed(2)}`;

        const tbody = document.getElementById('tableBody');
        processedTeams.sort((a, b) => b.w - a.w).forEach(team => {
            let statusHTML = (team.diff >= threshold) ? '<span class="status-tag lucky">Lucky</span>' : 
                             (team.diff <= -threshold) ? '<span class="status-tag unlucky">Unlucky</span>' : 
                             '<span class="neutral">—</span>';

            const diffClass = team.diff >= 0 ? 'diff-pos' : 'diff-neg';
            const diffSign = team.diff > 0 ? '+' : '';

            tbody.innerHTML += `
                <tr>
                    <td style="text-align:left; font-weight:600;">${team.name}</td>
                    <td>${team.w} - ${team.l}</td>
                    <td>${team.rs} / ${team.ra}</td>
                    <td>${team.xW} - ${team.xL}</td>
                    <td class="${diffClass}">${diffSign}${team.diff}</td>
                    <td class="proj-cell">${team.projW} - ${team.projL}</td>
                    <td>${statusHTML}</td>
                </tr>`;
        });

        document.getElementById('loader').style.display = 'none';
        document.getElementById('mlbTable').style.display = 'table';
    }

    fetchData();
</script>

</div>
</body>
</html>
